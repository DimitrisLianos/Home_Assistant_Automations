alias: "Safety: Auto-Close Water Valve"
description: Prevents flooding if the main automation crashes during the delay.
triggers:
  - trigger: state
    entity_id: switch.sonoff_swv
    to: "on"
    for:
      hours: 0
      minutes: 20
      seconds: 0
actions:
  - action: switch.turn_off
    target:
      entity_id: switch.sonoff_swv
  - action: persistent_notification.create
    data:
      title: "⚠️ WATER VALVE SAFETY TRIGGERED"
      message: "The Sonoff valve was left open for more than 20 minutes. It has been forced closed to prevent flooding."
mode: single
